name: Bazel Build and Test
on:
  push:
    branches: [ main ]
    paths:
        - Python/**
        - .github/**
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Setup bazelisk for Bazel builds
        # You may pin to the exact commit or the version.
        # uses: holvonix-open/setup-bazelisk@461095abb6f789e6093c2165080d0ce1db13f2ba
        uses: bazel-contrib/setup-bazel@0.18.0
        with:
          # Avoid downloading Bazel every time.
          bazelisk-cache: true
          # Store build cache per workflow.
          disk-cache: ${{ github.workflow }}
          # Share repository cache between workflows.
          repository-cache: true
      - name: Build Tarball
        run: bazel build //Python:tarball --platforms=//Python:linux_arm64 --noincompatible_enable_cc_toolchain_resolution
      - name: Build Viewer
        run: bazel build //Python:viewer
      - name: Run Tests
        run: bazel test //Python:split_test
