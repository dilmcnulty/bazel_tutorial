name: Bazel Build
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
      - name: Setup bazelisk for Bazel builds
        # You may pin to the exact commit or the version.
        # uses: holvonix-open/setup-bazelisk@461095abb6f789e6093c2165080d0ce1db13f2ba
        uses: holvonix-open/setup-bazelisk@v0.6.1
        with:
          # Version of @bazel/bazelisk npm package
          bazeliskVersion: latest # default is latest
      - name: Build Tarball
        run: bazel build //Python:tarball --platforms=//Python:linux_arm64 --noincompatible_enable_cc_toolchain_resolution
      - name: Build Viewer
        run: bazel build //Python:viewer
        
          
      
          
